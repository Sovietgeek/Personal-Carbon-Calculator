<!DOCTYPE html>
<html>
<head>
    <title>Single Page Layout</title>

    <!-- Internal CSS -->
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Header */
        .header {
            background-color: rgb(21, 114, 146);
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Container */
        .container {
            display: flex;
            height: 80vh;
        }

        /* Navigation */
        .nav {
            width: 25%;
            background-color: #eee;
            padding: 20px;
        }

        .nav a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: blue;
        }

        /* Content */
        .content {
            width: 75%;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        Website Header
    </div>

    <!-- Navigation + Content -->
    <div class="container">

        <div class="nav">
            <h3>Navigation</h3>
            <a href="#">Home</a>
            <a href="#">Register</a>
            <a href="#">Login</a>
            <a href="#">Contact</a>
        </div>

        <div class="content">
            <h2>Content Section</h2>
            <p>This is the content area of the webpage.</p>
        </div>

    </div>

</body>
</html>
