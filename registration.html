<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial;
            background-color: #12d1cd;
        }
        .box {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background-color: rgb(19, 111, 192);
            border: 2px solid #ccc;
        }
        h2 {
            text-align: center;
            color: green;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        input[type=submit] {
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Registration Form</h2>

        <form action="login.html">
            Name:
            <input type="text" required>

            Email:
            <input type="email" required>

            Username:
            <input type="text" required>

            Password:
            <input type="password" required>

            <br><br>
            <input type="submit" value="Register">
        </form>
    </div>

</body>
</html>
